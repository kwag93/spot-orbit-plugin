name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    name: Scan for sensitive information
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for internal hostnames and credentials
        env:
          SENSITIVE_PATTERNS: ${{ vars.SENSITIVE_PATTERNS }}
        run: |
          echo "=== Scanning for sensitive patterns ==="
          FOUND=0

          if [ -z "$SENSITIVE_PATTERNS" ]; then
            echo "::warning::SENSITIVE_PATTERNS repository variable not set. Skipping custom pattern scan."
            echo "Set it in Settings > Secrets and variables > Actions > Variables."
            echo "Format: comma-separated regex patterns (e.g. 'mycompany,internal\\.host')"
          else
            IFS=',' read -ra PATTERNS <<< "$SENSITIVE_PATTERNS"
            for pattern in "${PATTERNS[@]}"; do
              pattern=$(echo "$pattern" | xargs)
              MATCHES=$(grep -rniE "$pattern" . \
                --include='*.md' --include='*.json' --include='*.js' \
                --include='*.py' --include='*.sh' --include='*.toml' \
                --include='*.yml' --include='*.yaml' --include='*.txt' \
                --exclude-dir=.git --exclude-dir=node_modules \
                --exclude=secrets-scan.yml \
                || true)
              if [ -n "$MATCHES" ]; then
                echo "::error::Sensitive pattern detected."
                echo "$MATCHES"
                FOUND=1
              fi
            done
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Sensitive information detected. Remove before merging."
            exit 1
          fi
          echo "No sensitive information found."

      - name: Check for hardcoded API tokens
        run: |
          echo "=== Scanning for API tokens ==="
          FOUND=0
          EXCLUDE_FILES="config.toml.example|secrets-scan.yml|README|\.test\.js|\.spec\.js"

          MATCHES=$(grep -rniE 'Bearer [A-Za-z0-9+/=]{20,}' . \
            --include='*.py' --include='*.js' --include='*.json' \
            --include='*.toml' --include='*.sh' \
            --exclude-dir=.git --exclude-dir=node_modules \
            | grep -vE "$EXCLUDE_FILES" || true)

          if [ -n "$MATCHES" ]; then
            echo "::error::Possible hardcoded token found:"
            echo "$MATCHES"
            FOUND=1
          fi

          MATCHES=$(grep -rniE '(api[_-]?(token|key)|password)\s*=\s*"[^"]{10,}"' . \
            --include='*.py' --include='*.js' --include='*.json' \
            --include='*.toml' --include='*.sh' \
            --exclude-dir=.git --exclude-dir=node_modules \
            | grep -vE "$EXCLUDE_FILES" \
            | grep -vE '\$\{' || true)

          if [ -n "$MATCHES" ]; then
            echo "::error::Possible credential found:"
            echo "$MATCHES"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Possible credentials detected. Review before merging."
            exit 1
          fi
          echo "No hardcoded tokens found."

      - name: Check for private IP patterns
        run: |
          echo "=== Scanning for non-documentation IPs ==="

          # Well-known BD documentation IPs and standard addresses are excluded
          BD_SAFE='(192\.168\.(80\.3|50\.(3|5|6|110|202)|1\.(5|100)|2\.(5|40)|0\.)|10\.0\.0\.(1|3)|127\.0\.0\.1|0\.0\.0\.0|8\.8\.8\.8|224\.0\.0\.251|255\.255)'

          MATCHES=$(grep -rnoE '([0-9]{1,3}\.){3}[0-9]{1,3}' . \
            --include='*.py' --include='*.js' --include='*.json' \
            --include='*.toml' --include='*.sh' \
            --exclude-dir=.git --exclude-dir=node_modules \
            --exclude=secrets-scan.yml \
            | grep -vE "$BD_SAFE" \
            | grep -vE '(schema\.org|json-schema|w3\.org|npmjs\.org|registry\.|github\.|python\.org|pypi\.org)' \
            || true)

          if [ -n "$MATCHES" ]; then
            echo "::warning::Non-standard IPs found in code files (review manually):"
            echo "$MATCHES"
          else
            echo "Only well-known documentation IPs found."
          fi
